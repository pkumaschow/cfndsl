name: Publish Docker

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract cfndsl version from Dockerfile
        id: cfndsl_version
        run: |
          echo "version=$(grep -oP 'CFNDSL_VERSION="\K[^"]+' Dockerfile)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # PRs: load locally (no attestations — required for Scout local analysis)
      - name: Build and load (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: pkumaschow/cfndsl:latest
          build-args: CFNDSL_VERSION=${{ steps.cfndsl_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # main: push with full supply chain attestations
      - name: Build and push (main)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: pkumaschow/cfndsl:latest,pkumaschow/cfndsl:${{ steps.cfndsl_version.outputs.version }}
          build-args: CFNDSL_VERSION=${{ steps.cfndsl_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # PRs: compare against production, comment findings on the PR
      - name: Docker Scout compare
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: pkumaschow/cfndsl:latest
          to-env: production
          ignore-unchanged: true
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # main: record CVEs after push
      - name: Docker Scout record
        if: github.event_name == 'push'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: pkumaschow/cfndsl:latest
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}
